apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
      - name: auth-db
        image: postgres:13
        env:
        - name: POSTGRES_USER
          value: "auth_user"
        - name: POSTGRES_PASSWORD
          value: "auth_pass"
        - name: POSTGRES_DB
          value: "auth_db"
        ports:
        - containerPort: 5432
          name: postgres
